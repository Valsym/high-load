# PostgreSQL primary configuration for CDC with Debezium + Streaming Replication
wal_level = logical
max_wal_senders = 10
wal_keep_size = 1024        # keep WAL segments for replica sync (MB)
max_replication_slots = 10
listen_addresses = '*'

# Replication settings
max_wal_size = 2GB
min_wal_size = 512MB
wal_log_hints = on          # needed for pg_rewind after failover
hot_standby = on            # allow read-only queries on replica