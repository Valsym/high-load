global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'laravel'
    metrics_path: '/prometheus'
    static_configs:
      - targets: ['laravel.test:80']
    # В PHP-FPM метрики живут только пока есть данные в кэше.
    # scrape_interval лучше уменьшить, чтобы не пропускать данные
    scrape_interval: 10s
