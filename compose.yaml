services:
    laravel.test:
        build:
            context: ./docker/php
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: sail-8.5/app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - pgsql
    pgsql:
        image: 'postgres:18-alpine'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql'
            - './docker/postgres/init:/docker-entrypoint-initdb.d'
            - './docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro'
        command:
            - 'postgres'
            - '-c'
            - 'config_file=/etc/postgresql/postgresql.conf'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - pg_isready
                - '-q'
                - '-d'
                - '${DB_DATABASE}'
                - '-U'
                - '${DB_USERNAME}'
            retries: 3
            timeout: 5s

    # Kafka + Zookeeper
    zookeeper:
        image: confluentinc/cp-zookeeper:7.6.0
        environment:
            ZOOKEEPER_CLIENT_PORT: 2181
            ZOOKEEPER_TICK_TIME: 2000
        ports:
            - "2181:2181"
        networks:
            - sail

    kafka:
        image: confluentinc/cp-kafka:7.6.0
        depends_on:
            - zookeeper
        ports:
            - "9092:9092"
        environment:
            KAFKA_BROKER_ID: 1
            KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        networks:
            - sail

    # ClickHouse
    clickhouse:
        image: yandex/clickhouse-server:latest
        ports:
            - "8123:8123"
            - "9000:9000"
        volumes:
            - ./clickhouse/data:/var/lib/clickhouse
            - ./docker/clickhouse/config:/etc/clickhouse-server
        networks:
            - sail

    # Kafka Connect — Debezium с PostgreSQL плагином для CDC
    kafka-connect:
        image: debezium/connect:2.5.4.Final
        depends_on:
            kafka:
                condition: service_started
            pgsql:
                condition: service_healthy
        ports:
            - "8083:8083"
        environment:
            BOOTSTRAP_SERVERS: kafka:9092
            GROUP_ID: compose-connect-group
            CONFIG_STORAGE_TOPIC: docker-connect-configs
            OFFSET_STORAGE_TOPIC: docker-connect-offsets
            STATUS_STORAGE_TOPIC: docker-connect-status
            KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
            VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
            KEY_CONVERTER_SCHEMAS_ENABLE: "false"
            VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
            CONNECT_LOG4J_LOGGERS: "io.debezium=INFO,org.apache.kafka.connect=INFO"
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
            interval: 15s
            timeout: 5s
            retries: 10
            start_period: 30s
        networks:
            - sail

    # Prometheus
    prometheus:
        image: prom/prometheus:latest
        ports:
            - "9090:9090"
        volumes:
            - ./docker/prometheus/config:/etc/prometheus
        networks:
            - sail

    # Grafana
    grafana:
        image: grafana/grafana:latest
        depends_on:
            - prometheus
        ports:
            - "3000:3000"
        volumes:
            - ./docker/grafana/data:/var/lib/grafana
            - ./docker/grafana/provisioning:/etc/grafana/provisioning
        networks:
            - sail

networks:
    sail:
        driver: bridge
volumes:
    sail-pgsql:
        driver: local
