upstream backend {
    # Docker Compose автоматически резолвит имена контейнеров
    # При масштабировании laravel.test будет несколько экземпляров:
    # high-rps-pg_laravel.test_1, _2, _3 и т.д.
    # Можно указать явно:
    # server high-rps-pg_laravel.test_1:80;
    # server high-rps-pg_laravel.test_2:80;
    # server high-rps-pg_laravel.test_3:80;
    # Можно указать явно или использовать переменные, но проще всего — указать сервис "laravel.test"
    # Docker автоматически балансирует между репликами через внутренний DNS.
    server laravel.test:80;
}

server {
    listen 80;

    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
